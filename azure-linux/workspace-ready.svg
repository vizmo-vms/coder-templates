<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 600 300"
  width="100%"
  height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700&amp;display=swap');
      
      .bg { fill: #111827; }
      
      /* Terminal window */
      .terminal {
        transform-origin: 50% 50%;
        animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        opacity: 0;
      }
      
      .dot { opacity: 0; animation: fadeIn 0.3s ease forwards; }
      .dot-1 { animation-delay: 0.5s; }
      .dot-2 { animation-delay: 0.7s; }
      .dot-3 { animation-delay: 0.9s; }
      
      /* Code lines drawing */
      .line {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: drawLine 1s ease forwards;
      }
      .line-1 { animation-delay: 1.2s; }
      .line-2 { animation-delay: 1.5s; stroke-dasharray: 150; stroke-dashoffset: 150; }
      .line-3 { animation-delay: 1.8s; stroke-dasharray: 100; stroke-dashoffset: 100; }
      
      /* Fade out code to show checkmark */
      .code-group {
        animation: fadeOut 0.5s ease 2.8s forwards;
      }
      
      /* Checkmark animations */
      .check-circle {
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: drawCircle 0.8s ease 3.3s forwards;
      }
      .check-path {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: drawCheck 0.5s ease 3.8s forwards;
      }
      
      /* Text */
      .text {
        font-family: 'Inter', sans-serif;
        font-weight: 700;
        font-size: 24px;
        fill: #F9FAFB;
        opacity: 0;
        transform: translateY(10px);
        animation: slideUp 0.8s ease 4.3s forwards;
      }
      .subtext {
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 14px;
        fill: #9CA3AF;
        opacity: 0;
        transform: translateY(10px);
        animation: slideUp 0.8s ease 4.5s forwards;
      }
      
      /* Floating effect applied after entering */
      .container {
        animation: float 6s ease-in-out infinite 5s;
      }
      
      @keyframes popIn {
        0% { transform: translate(150px, 40px) scale(0.8); opacity: 0; }
        100% { transform: translate(150px, 40px) scale(1); opacity: 1; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
      @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
      }
      @keyframes drawCircle {
        to { stroke-dashoffset: 0; }
      }
      @keyframes drawCheck {
        to { stroke-dashoffset: 0; }
      }
      @keyframes slideUp {
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
    </style>

    <!-- Neon glow effect for the checkmark -->
    <filter id="glow"
      x="-20%"
      y="-20%"
      width="140%"
      height="140%">
      <feGaussianBlur stdDeviation="6"
        result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect class="bg"
    width="100%"
    height="100%"
    rx="16" />

  <g class="container">
    <!-- Terminal Window -->
    <!-- Translate to perfectly center the 300x180 terminal in a 600x300 viewBox
         X: (600 - 300) / 2 = 150
         Y: (300 - 180 - 45) / 2 = 37.5 (leaving room for the text to also be centered vertically as a unit) -->
    <g class="terminal"
      style="transform-origin: 300px 130px;">
      <!-- Terminal Box -->
      <rect x="0"
        y="0"
        width="300"
        height="180"
        rx="12"
        fill="#1F2937"
        stroke="#374151"
        stroke-width="2" />

      <!-- Terminal Header -->
      <path d="M0 12 C0 5.372 5.372 0 12 0 L288 0 C294.627 0 300 5.372 300 12 L300 30 L0 30 Z"
        fill="#374151" />

      <!-- Window Controls -->
      <circle cx="20"
        cy="15"
        r="5"
        fill="#EF4444"
        class="dot dot-1" />
      <circle cx="40"
        cy="15"
        r="5"
        fill="#F5A524"
        class="dot dot-2" />
      <circle cx="60"
        cy="15"
        r="5"
        fill="#10B981"
        class="dot dot-3" />

      <!-- Inside Terminal (Animated Lines to Simulate cloud-init / provisioning) -->
      <g class="code-group"
        transform="translate(20, 60)">
        <path class="line line-1"
          d="M0 0 L150 0"
          stroke="#10B981"
          stroke-width="6"
          stroke-linecap="round" />
        <path class="line line-1"
          d="M170 0 L220 0"
          stroke="#60A5FA"
          stroke-width="6"
          stroke-linecap="round" />

        <path class="line line-2"
          d="M0 30 L100 30"
          stroke="#E879F9"
          stroke-width="6"
          stroke-linecap="round" />
        <path class="line line-2"
          d="M120 30 L180 30"
          stroke="#9CA3AF"
          stroke-width="6"
          stroke-linecap="round" />

        <path class="line line-3"
          d="M0 60 L80 60"
          stroke="#FBBF24"
          stroke-width="6"
          stroke-linecap="round" />

        <!-- Final success line -->
        <path class="line line-3"
          d="M0 90 L200 90"
          stroke="#34D399"
          stroke-width="6"
          stroke-linecap="round" />
      </g>

      <!-- Checkmark (Initially hidden, draws after code fades out) -->
      <g transform="translate(150, 105)">
        <circle class="check-circle"
          cx="0"
          cy="0"
          r="40"
          fill="none"
          stroke="#10B981"
          stroke-width="6"
          filter="url(#glow)" />
        <path class="check-path"
          d="M-15 0 L-5 10 L20 -15"
          fill="none"
          stroke="#10B981"
          stroke-width="6"
          stroke-linecap="round"
          stroke-linejoin="round" />
      </g>
    </g>

    <!-- Status Text Elements - Positioned relative to center width (300) and below terminal -->
    <text class="text"
      x="300"
      y="255"
      text-anchor="middle">Workspace Provisioned</text>
    <text class="subtext"
      x="300"
      y="275"
      text-anchor="middle">Your Coder environment is ready to use.</text>
  </g>
</svg>
